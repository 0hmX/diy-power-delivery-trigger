<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PD Trigger Animation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#181512",
              paper: "#fffaf3",
              fog: "#f3eadf",
              copper: "#cc7a29",
              moss: "#698571",
              slate: "#8ca9bb",
              shell: "#f8f1e8",
            },
            fontFamily: {
              display: ['"Cormorant Garamond"', "serif"],
              body: ['"Manrope"', "sans-serif"],
            },
            boxShadow: {
              card: "0 0 0 1px rgba(24,21,18,.08), 0 28px 80px rgba(96,66,33,.14)",
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background:
          radial-gradient(circle at top left, rgba(204, 122, 41, 0.13), transparent 26%),
          radial-gradient(circle at top right, rgba(140, 169, 187, 0.16), transparent 24%),
          linear-gradient(180deg, #fffaf3 0%, #f7efe5 50%, #f2e9de 100%);
      }

      .grid-paper {
        background-image:
          linear-gradient(rgba(24, 21, 18, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(24, 21, 18, 0.04) 1px, transparent 1px);
        background-size: 26px 26px;
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body class="font-body text-ink">
    <main class="min-h-screen px-4 py-6">
      <section class="mx-auto w-full max-w-[430px]">
        <div class="grid-paper relative overflow-hidden rounded-[34px] border border-black/10 bg-white/55 p-4 shadow-card">
          <div class="absolute inset-0 bg-gradient-to-br from-white/70 via-white/30 to-transparent"></div>

          <div class="relative mb-4 flex items-center justify-between">
            <div class="text-[10px] uppercase tracking-[0.34em] text-copper">pd trigger</div>
            <div class="h-2 w-2 rounded-full bg-copper/80"></div>
          </div>

          <div class="overflow-hidden rounded-[28px] border border-black/10 bg-paper">
            <canvas id="flowCanvas" width="390" height="620" aria-label="PD trigger flow animation"></canvas>
          </div>
        </div>
      </section>
    </main>

    <script>
      const canvas = document.getElementById("flowCanvas")
      const ctx = canvas.getContext("2d")

      const nodes = {
        input: { x: 80, y: 95, w: 90, h: 90, label: "IN", title: "USB-C", tone: "#cc7a29" },
        pd: { x: 150, y: 235, w: 90, h: 90, label: "PD", title: "FUSB302", tone: "#cc7a29" },
        mcu: { x: 260, y: 95, w: 90, h: 90, label: "CTRL", title: "STM32", tone: "#8ca9bb" },
        button: { x: 40, y: 235, w: 70, h: 70, label: "BTN", title: "Select", tone: "#8ca9bb" },
        buck: { x: 150, y: 375, w: 90, h: 90, label: "3.3V", title: "Buck", tone: "#698571" },
        out: { x: 55, y: 505, w: 280, h: 85, label: "OUT", title: "VBUS  GND", tone: "#cc7a29", dark: true },
      }

      const powerPath = [
        { x: 125, y: 140 },
        { x: 195, y: 140 },
        { x: 195, y: 280 },
        { x: 195, y: 420 },
        { x: 195, y: 548 },
      ]

      const controlPath = [
        { x: 295, y: 140 },
        { x: 295, y: 95 + 45 },
        { x: 295, y: 185 },
        { x: 195, y: 280 },
      ]

      const buttonPath = [
        { x: 75, y: 270 },
        { x: 120, y: 270 },
        { x: 195, y: 280 },
      ]

      function roundedRect(x, y, w, h, r) {
        ctx.beginPath()
        ctx.moveTo(x + r, y)
        ctx.arcTo(x + w, y, x + w, y + h, r)
        ctx.arcTo(x + w, y + h, x, y + h, r)
        ctx.arcTo(x, y + h, x, y, r)
        ctx.arcTo(x, y, x + w, y, r)
        ctx.closePath()
      }

      function line(points, color, width = 2, alpha = 1) {
        ctx.save()
        ctx.strokeStyle = color
        ctx.globalAlpha = alpha
        ctx.lineWidth = width
        ctx.lineCap = "round"
        ctx.lineJoin = "round"
        ctx.beginPath()
        ctx.moveTo(points[0].x, points[0].y)
        for (let i = 1; i < points.length; i += 1) ctx.lineTo(points[i].x, points[i].y)
        ctx.stroke()
        ctx.restore()
      }

      function pointAlong(points, progress) {
        const segments = []
        let total = 0
        for (let i = 1; i < points.length; i += 1) {
          const dx = points[i].x - points[i - 1].x
          const dy = points[i].y - points[i - 1].y
          const len = Math.hypot(dx, dy)
          segments.push({ start: points[i - 1], end: points[i], len })
          total += len
        }
        let dist = total * progress
        for (const seg of segments) {
          if (dist <= seg.len) {
            const t = seg.len === 0 ? 0 : dist / seg.len
            return {
              x: seg.start.x + (seg.end.x - seg.start.x) * t,
              y: seg.start.y + (seg.end.y - seg.start.y) * t,
            }
          }
          dist -= seg.len
        }
        return points[points.length - 1]
      }

      function drawNode(node, glow = 0) {
        ctx.save()
        if (glow > 0) {
          ctx.shadowColor = node.tone
          ctx.shadowBlur = 30 * glow
        }
        roundedRect(node.x, node.y, node.w, node.h, 24)
        ctx.fillStyle = node.dark ? "#1e1c19" : "rgba(255,255,255,.86)"
        ctx.fill()
        ctx.lineWidth = 1
        ctx.strokeStyle = "rgba(24,21,18,.1)"
        ctx.stroke()
        ctx.restore()

        ctx.save()
        ctx.fillStyle = node.dark ? "rgba(255,255,255,.45)" : "rgba(24,21,18,.35)"
        ctx.font = "600 10px Manrope"
        ctx.textAlign = "center"
        ctx.fillText(node.label, node.x + node.w / 2, node.y + 18)
        ctx.fillStyle = node.dark ? "#fffaf3" : "#181512"
        ctx.font = node.dark ? "600 28px Cormorant Garamond" : "600 24px Cormorant Garamond"
        ctx.fillText(node.title, node.x + node.w / 2, node.y + node.h / 2 + 8)
        ctx.restore()
      }

      function drawPulse(pos, color, radius) {
        ctx.save()
        const g = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, radius * 4)
        g.addColorStop(0, color)
        g.addColorStop(0.4, color + "66")
        g.addColorStop(1, color + "00")
        ctx.fillStyle = g
        ctx.beginPath()
        ctx.arc(pos.x, pos.y, radius * 4, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = color
        ctx.beginPath()
        ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2)
        ctx.fill()
        ctx.restore()
      }

      function render(t) {
        const time = (t * 0.001) % 8
        const powerP = Math.min(Math.max((time - 0.3) / 3.6, 0), 1)
        const buttonP = Math.min(Math.max((time - 1.1) / 1.1, 0), 1)
        const controlP = Math.min(Math.max((time - 2.0) / 1.5, 0), 1)

        ctx.clearRect(0, 0, canvas.width, canvas.height)

        ctx.fillStyle = "#fffaf3"
        ctx.fillRect(0, 0, canvas.width, canvas.height)

        for (let x = 0; x < canvas.width; x += 26) {
          ctx.fillStyle = "rgba(24,21,18,.025)"
          ctx.fillRect(x, 0, 1, canvas.height)
        }
        for (let y = 0; y < canvas.height; y += 26) {
          ctx.fillStyle = "rgba(24,21,18,.025)"
          ctx.fillRect(0, y, canvas.width, 1)
        }

        line(powerPath, "rgba(204,122,41,.25)", 3)
        line(controlPath, "rgba(140,169,187,.22)", 2)
        line(buttonPath, "rgba(140,169,187,.18)", 2)

        drawNode(nodes.input, powerP > 0.02 ? 0.4 : 0)
        drawNode(nodes.pd, powerP > 0.2 ? 0.5 : 0)
        drawNode(nodes.mcu, controlP > 0.1 ? 0.45 : 0)
        drawNode(nodes.button, buttonP > 0.1 ? 0.35 : 0)
        drawNode(nodes.buck, powerP > 0.55 ? 0.45 : 0)
        drawNode(nodes.out, powerP > 0.9 ? 0.5 : 0)

        if (powerP > 0 && powerP < 1.02) drawPulse(pointAlong(powerPath, powerP), "#cc7a29", 7)
        if (controlP > 0 && controlP < 1.02) drawPulse(pointAlong(controlPath, controlP), "#8ca9bb", 5)
        if (buttonP > 0 && buttonP < 1.02) drawPulse(pointAlong(buttonPath, buttonP), "#8ca9bb", 4)

        requestAnimationFrame(render)
      }

      requestAnimationFrame(render)
    </script>
  </body>
</html>
