<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 128 56" role="img" aria-labelledby="title desc">
  <title id="title">DIY Power Delivery Trigger Board</title>
  <desc id="desc">Standalone SVG rendering of an idealized PCB layout for the DIY power delivery trigger board.</desc>
  <defs>
    <style>
      .board { fill: #124734; stroke: #d7e5d8; stroke-width: 0.35; }
      .part { fill: #101418; stroke: #dfe7e2; stroke-width: 0.18; rx: 0.5; ry: 0.5; }
      .part-light { fill: #dcd6c8; stroke: #2c3338; stroke-width: 0.16; rx: 0.4; ry: 0.4; }
      .connector { fill: #b8c4cc; stroke: #1d2428; stroke-width: 0.2; }
      .ic { fill: #232a2f; stroke: #e6ece8; stroke-width: 0.18; }
      .label { fill: #edf5ef; font-family: "IBM Plex Sans", "Segoe UI", sans-serif; font-size: 1.15px; text-anchor: middle; dominant-baseline: middle; }
      .small { font-size: 0.9px; }
      .outline { fill: none; stroke: rgba(255,255,255,0.18); stroke-width: 0.12; stroke-dasharray: 0.8 0.6; }
      .mount { fill: #d9c08f; stroke: #4f3b1c; stroke-width: 0.15; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0.25" dy="0.35" stdDeviation="0.35" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0.6" y="0.6" width="126.8" height="54.8" rx="2.2" class="board"/>

  <g opacity="0.14">
    <path d="M 8 10 H 120" class="outline"/>
    <path d="M 8 28 H 120" class="outline"/>
    <path d="M 8 46 H 120" class="outline"/>
    <path d="M 22 6 V 50" class="outline"/>
    <path d="M 64 6 V 50" class="outline"/>
    <path d="M 106 6 V 50" class="outline"/>
  </g>

  <g>
    <rect x="0.9" y="22.2" width="6.2" height="11.6" rx="0.9" class="connector"/>
    <text x="4.0" y="27.3" class="label">USB2</text>
    <text x="4.0" y="29.3" class="label small">USB-C</text>

    <rect x="10.0" y="22.0" width="1.8" height="1.2" class="part-light"/>
    <rect x="10.0" y="32.8" width="1.8" height="1.2" class="part-light"/>
    <text x="10.9" y="21.0" class="label small">R1</text>
    <text x="10.9" y="35.0" class="label small">R2</text>

    <rect x="13.4" y="21.8" width="2.8" height="1.4" class="part"/>
    <rect x="13.4" y="33.0" width="2.8" height="1.4" class="part"/>
    <text x="14.8" y="20.8" class="label small">D1</text>
    <text x="14.8" y="35.2" class="label small">D2</text>

    <rect x="18.6" y="25.4" width="3.6" height="5.4" class="ic"/>
    <text x="20.4" y="27.8" class="label">U1</text>
    <text x="20.4" y="29.5" class="label small">FUSB302</text>

    <rect x="24.0" y="23.0" width="1.7" height="1.1" class="part-light"/>
    <rect x="24.0" y="31.9" width="2.2" height="1.5" class="part-light"/>
    <rect x="17.4" y="17.5" width="1.7" height="1.1" class="part-light"/>
    <rect x="17.4" y="37.2" width="1.7" height="1.1" class="part-light"/>
    <text x="24.8" y="22.1" class="label small">C7</text>
    <text x="25.1" y="34.5" class="label small">C8</text>
    <text x="18.2" y="16.7" class="label small">C9</text>
    <text x="18.2" y="38.9" class="label small">C10</text>
  </g>

  <g>
    <rect x="30.0" y="24.6" width="2.4" height="1.8" class="part-light"/>
    <rect x="30.0" y="31.8" width="2.4" height="1.8" class="part-light"/>
    <rect x="35.2" y="26.9" width="3.8" height="2.7" class="ic"/>
    <rect x="35.8" y="22.1" width="1.6" height="1.1" class="part-light"/>
    <rect x="41.8" y="26.7" width="4.8" height="3.0" class="part"/>
    <rect x="49.2" y="24.4" width="4.0" height="1.8" class="part-light"/>
    <rect x="49.2" y="31.8" width="4.0" height="1.8" class="part-light"/>
    <text x="31.2" y="23.6" class="label small">C2</text>
    <text x="31.2" y="35.0" class="label small">C4</text>
    <text x="37.1" y="28.2" class="label">U3</text>
    <text x="37.1" y="29.8" class="label small">BUCK</text>
    <text x="36.6" y="21.2" class="label small">C11</text>
    <text x="44.2" y="31.6" class="label small">L1</text>
    <text x="51.2" y="23.5" class="label small">C5</text>
    <text x="51.2" y="35.0" class="label small">C3</text>
  </g>

  <g>
    <rect x="58.4" y="22.8" width="10.2" height="8.2" class="ic"/>
    <text x="63.5" y="26.0" class="label">U2</text>
    <text x="63.5" y="27.8" class="label small">STM32F030</text>

    <rect x="54.0" y="23.0" width="1.8" height="0.9" class="part-light"/>
    <rect x="54.0" y="26.0" width="1.8" height="0.9" class="part-light"/>
    <rect x="54.0" y="29.0" width="1.8" height="0.9" class="part-light"/>
    <text x="54.9" y="22.0" class="label small">R3</text>
    <text x="54.9" y="25.0" class="label small">R4</text>
    <text x="54.9" y="31.0" class="label small">R8</text>

    <rect x="71.2" y="30.0" width="1.6" height="0.8" class="part-light"/>
    <text x="72.0" y="32.0" class="label small">C1</text>
  </g>

  <g>
    <rect x="82.0" y="10.8" width="4.4" height="2.6" class="part"/>
    <rect x="78.8" y="11.6" width="1.6" height="0.8" class="part-light"/>
    <rect x="88.8" y="11.6" width="1.6" height="0.8" class="part-light"/>
    <text x="84.2" y="12.1" class="label small">SW1</text>
    <text x="79.6" y="10.6" class="label small">R9</text>
    <text x="89.6" y="10.6" class="label small">C6</text>

    <rect x="81.4" y="37.0" width="7.4" height="4.8" class="part"/>
    <rect x="76.8" y="38.2" width="1.6" height="0.8" class="part-light"/>
    <rect x="91.4" y="34.0" width="1.6" height="0.8" class="part-light"/>
    <rect x="91.4" y="43.0" width="1.6" height="0.8" class="part-light"/>
    <text x="85.1" y="38.9" class="label">LED1</text>
    <text x="85.1" y="40.6" class="label small">RGB 5050</text>
    <text x="77.6" y="40.1" class="label small">R7</text>
    <text x="92.2" y="33.1" class="label small">R6</text>
    <text x="92.2" y="44.9" class="label small">R5</text>
  </g>

  <g>
    <rect x="119.2" y="23.2" width="4.0" height="9.2" class="connector"/>
    <circle cx="121.2" cy="26.3" r="0.7" class="mount"/>
    <circle cx="121.2" cy="29.8" r="0.7" class="mount"/>
    <text x="121.2" y="21.4" class="label">CN1</text>
  </g>

  <g>
    <text x="6.5" y="7.5" class="label" text-anchor="start">DIY POWER DELIVERY TRIGGER</text>
    <text x="6.5" y="10" class="label small" text-anchor="start">Idealized component-only floorplan</text>
    <text x="121.5" y="50.5" class="label small" text-anchor="end">USB edge-left, power chain left-to-right, output edge-right</text>
  </g>
</svg>
